apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-service
  labels:
    app: gpu-service
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gpu-service
  template:
    metadata:
      labels:
        app: gpu-service
    spec:
      containers:
      - name: gpu-service
        image: gpu-service  # Skaffold 會自動取代這個 image 名稱與 tag
        resources:
          limits:
            nvidia.com/gpu: 1  # 請求 1 個 GPU 資源
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-service
spec:
  selector:
    app: gpu-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

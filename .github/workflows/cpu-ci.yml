name: CPU Service CI/CD (Professional Split-repo)

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/cpu-service/**'
      - '.github/workflows/cpu-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          cd apps/cpu-service
          pip install -r requirements.txt
      - name: Run Unit Tests
        run: |
          cd apps/cpu-service
          pytest test_main.py

  k8s-integration-test:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 使用專業的 checkout 方式抓取遠端配置倉庫
      - name: Checkout Manifest Repo (for testing)
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository_owner }}/k8s-manifests
          token: ${{ secrets.GH_PAT }} # 這裡解決了 Private Repo 的訪問問題
          path: remote-manifests

      - name: Create KinD Cluster
        uses: helm/kind-action@v1.4.0
        with:
          cluster_name: integration-test-cluster

      - name: Build local image for testing
        run: |
          docker build -t cpu-service:test apps/cpu-service/

      - name: Load image into KinD
        run: |
          kind load docker-image cpu-service:test --name integration-test-cluster

      - name: Deploy and Verify
        run: |
          cd remote-manifests
          sed -i "s|image: .*cpu-service.*|image: cpu-service:test|g" apps/cpu-service/cpu-deployment.yaml
          kubectl apply -f apps/cpu-service/cpu-deployment.yaml
          
          echo "Waiting for pod to be ready..."
          kubectl rollout status deployment/cpu-service --timeout=60s

  build-and-push:
    needs: k8s-integration-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/cpu-service
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest apps/cpu-service/
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  gitops-update:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifest Repo (for update)
        uses: actions/checkout@v3
        with:
          repository: ${{ github.repository_owner }}/k8s-manifests
          token: ${{ secrets.GH_PAT }}
          path: manifests-repo

      - name: Update Kubernetes Manifest
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/cpu-service
          
          cd manifests-repo
          sed -i "s|image: .*cpu-service.*|image: $IMAGE_NAME:$IMAGE_TAG|g" apps/cpu-service/cpu-deployment.yaml

      - name: Commit and Push to Manifest Repo
        run: |
          cd manifests-repo
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add apps/cpu-service/cpu-deployment.yaml
          git commit -m "chore(gitops): update cpu-service image to $IMAGE_TAG"
          git push
